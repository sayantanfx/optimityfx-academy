<body>

<div class="progress"></div>

<!-- Minimal nav -->
<header class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="brand">
      <img src="assets/logo-nav.webp" alt="OptimityFX" class="brand-img" width="332" height="112">
    </a>
    <div class="nav-cta">
      <a href="https://optimityfx.com" class="back-main" title="Back to main site">← optimityfx.com</a>
      <button class="burger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<!-- Auth card -->
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/logo-nav.webp" alt="OptimityFX" width="200">
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your OptimityFX account</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email or username</label>
        <input class="form-input" type="text" id="email" placeholder="you@example.com or username" required autocomplete="username">
        <span class="form-error" id="email-err">Please enter a valid email or username.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="input-icon" id="toggle-pwd" aria-label="Show password">
            <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="form-error" id="pwd-err">Password is required.</span>
      </div>

      <div style="text-align:right; margin-bottom:20px; margin-top:-8px">
        <a href="forgot-password.html" style="font-size:.82rem; color:var(--accent)">Forgot password?</a>
      </div>

      <div class="form-error" id="form-err" style="display:none; margin-bottom:14px; padding:10px 14px; background:rgba(255,59,87,.08); border:1px solid rgba(255,59,87,.25); border-radius:10px;"></div>

      <button type="submit" class="btn btn-accent btn-full" id="login-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </button>
    </form>

    <div class="auth-divider">or continue with</div>

    <button class="btn-google" id="google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      New to OptimityFX? <a href="register.html">Create an account →</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260615b"></script>
<script src="js/auth.js?v=20260618a"></script>
<script src="js/main.js?v=20260608"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // NOTE: We deliberately do NOT auto-redirect away from this page just
  // because a session already exists. This is a SHARED login page used by
  // buyers, team members, and admins alike — staff routinely need to land
  // here to switch accounts (e.g. sign in as "superadmin" while a stale
  // "team" session is still cached). Auto-redirecting on page load fired
  // before the user could even submit the form, silently discarding their
  // typed credentials and bouncing them back into the OLD account's portal
  // (reported live: typing superadmin creds landed back in the Team Portal).
  // Letting the form always render — and always run a fresh signIn() on
  // submit, which replaces any existing session — fixes that for good.

  const form     = document.getElementById('login-form');
  const loginBtn = document.getElementById('login-btn');
  const formErr  = document.getElementById('form-err');
  const pwdInput = document.getElementById('password');
  const emailInput = document.getElementById('email');

  /* Password toggle */
  document.getElementById('toggle-pwd').addEventListener('click', () => {
    const isText = pwdInput.type === 'text';
    pwdInput.type = isText ? 'password' : 'text';
    document.getElementById('eye-open').style.display  = isText ? '' : 'none';
    document.getElementById('eye-closed').style.display = isText ? 'none' : '';
  });

  /* Google sign-in */
  document.getElementById('google-btn').addEventListener('click', () => {
    const next = new URLSearchParams(location.search).get('next');
    OFXAuth.signInWithGoogle(next);
  });

  /* Form submit */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formErr.style.display = 'none';

    const email = emailInput.value.trim();
    const pwd   = pwdInput.value;
    let valid = true;

    // Accept either a full email address or an internal username (letters/numbers/._-, 3+ chars)
    const isEmail    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    const isUsername = /^[a-zA-Z0-9._-]{3,}$/.test(email);
    if (!email || (!isEmail && !isUsername)) {
      document.getElementById('email-err').classList.add('show');
      emailInput.classList.add('error');
      valid = false;
    } else {
      document.getElementById('email-err').classList.remove('show');
      emailInput.classList.remove('error');
    }
    if (!pwd) {
      document.getElementById('pwd-err').classList.add('show');
      pwdInput.classList.add('error');
      valid = false;
    } else {
      document.getElementById('pwd-err').classList.remove('show');
      pwdInput.classList.remove('error');
    }
    if (!valid) return;

    loginBtn.classList.add('btn-loading');
    loginBtn.textContent = '';
    loginBtn.disabled = true;

    const { error } = await OFXAuth.signIn(email, pwd);

    loginBtn.classList.remove('btn-loading');
    loginBtn.disabled = false;
    loginBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Sign In`;

    if (error) {
      formErr.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message;
      formErr.style.display = 'block';
    } else {
      const explicitNext = new URLSearchParams(location.search).get('next');
      if (explicitNext) {
        // Came here via a protected-page redirect (e.g. admin.html → login.html?next=admin.html) — honor it.
        window.location.href = explicitNext;
        return;
      }
      // No explicit destination — route by role so internal admin/team
      // accounts land in their own portal instead of the buyer dashboard.
      let role = 'customer';
      try {
        const session = await OFXAuth.getSession();
        if (session) {
          const profile = await OFXAuth.getProfile(session.user.id);
          role = profile?.role || 'customer';
        }
      } catch { /* fall through to customer dashboard */ }

      if (role === 'super_admin' || role === 'admin') window.location.href = 'admin.html';
      else if (role === 'team')                       window.location.href = 'team/index.html';
      else                                             window.location.href = 'dashboard.html';
    }
  });
});
</script>
</body>
</html>
